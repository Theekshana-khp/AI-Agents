          - generic [ref=e182]:
            - heading "Preparation" [level=2] [ref=e184]
            - list [ref=e185]:
              - listitem [ref=e186]: Preheat the oven to 400˚F (200˚C).
              - listitem [ref=e187]: Pour the sweetened condensed milk into a baking dish. Cover with aluminum foil and set in a larger baking dish. Fill the larger dish with hot water until it reaches halfway up the sides of the smaller dish.
              - listitem [ref=e188]: Place in the oven and cook for 90 minutes. Check the water level occasionally, making sure that it reaches halfway and refilling as necessary.
              - complementary "Advertisement" [ref=e192]:
                - generic [ref=e194]: Advertisement
              - listitem [ref=e196]: Carefully remove the baking dish from the hot water bath and let cool to room temperature. Whisk the mixture (now it’s dulce de leche!) until smooth.
              - listitem [ref=e197]: Reduce the oven temperature to 350˚F (180˚C).
              - listitem [ref=e198]: In the bowl of a food processor, combine the graham crackers and melted butter. Pulse until crackers are finely ground and the mixture resembles wet sand.
              - complementary "Advertisement" [ref=e202]:
                - generic [ref=e204]: Advertisement
              - listitem [ref=e206]: Grease a 9-inch (22 cm) tart pan with nonstick spray. Add the graham cracker mixture to the tin and press evenly to cover pan completely.
              - listitem [ref=e207]: Bake crust for 5 minutes, until golden and fragrant. Transfer to a wire rack and let cool to room temperature.
              - listitem [ref=e208]: Spread the dulce de leche in the cooled tart crust, using a flexible spatula to smooth it into an even layer. Cover and refrigerate for at least 4 hours or up to overnight, until set.
              - listitem [ref=e209]: In a large bowl, beat the heavy cream until soft peaks are just beginning to form. Add the sugar and beat until soft peaks form.
              - listitem [ref=e210]: Remove the pie from the refrigerator. Scatter the banana slices over the dulce de leche. Top with the whipped cream, spreading evenly to cover bananas, and garnish with chocolate shavings.
              - listitem [ref=e211]: Enjoy!
              - listitem [ref=e212]:
