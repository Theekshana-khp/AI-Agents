              - heading "Directions" [level=2] [ref=e422]
              - list [ref=e423]:
                - listitem [ref=e424]:
                  - heading "Make the dulce de leche:" [level=3] [ref=e425]
                  - list [ref=e426]:
                    - listitem [ref=e427]:
                      - generic [ref=e428]: Step
                      - text: 1 Remove the label from the condensed milk can, scrubbing off any sticky bits under running water. In a large pot, place the can on its side, then add enough water to fully submerge the can. Bring the water to a boil then turn the heat down to medium. Continue to cook the can for 5 hours, adding water as necessary to keep can submerged.
                    - listitem [ref=e429]:
                      - generic [ref=e430]: Step
                      - text: 2 After 5 hours, use tongs to remove the can and place it in a bowl of ice water to cool completely. Refrigerate for about 2 hours before opening.
                    - listitem [ref=e431]:
                      - generic [ref=e432]: Step
                      - text: 3 Meanwhile, preheat oven to 375° and bake the crust until golden, about 6-10 minutes. Set aside to cool.
                - listitem [ref=e433]:
                  - heading "Make the ganache:" [level=3] [ref=e434]
                  - list [ref=e435]:
                    - listitem [ref=e436]:
                      - generic [ref=e437]: Step
                      - text: 1 In a large bowl, add the cocoa butter and chocolate. In a small pot, bring ¼ cup heavy cream to a simmer and immediately pour over the cocoa butter and chocolate. Let sit for about 3 minutes, then whisk to combine. (It should appear thick, shiny, and emulsified.)
                    - listitem [ref=e438]:
                      - generic [ref=e439]: Step
                      - text: 2 Pour the ganache into the cooled crust, tilting the crust to coat the bottoms and sides as you go. Freeze the chocolate-coated crust for about 3 to 5 minutes. Remove from the freezer and sprinkle the top of the ganache with 2 pinches salt.
                - listitem [ref=e440]:
                  - heading "Assemble the pie:" [level=3] [ref=e441]
                  - list [ref=e442]:
                    - listitem [ref=e443]:
                      - generic [ref=e444]: Step
                      - text: 1 Peel and cut bananas into ¼” slices. Using a spoon or an offset spatula, spread a third of the dulce de leche evenly across top of ganache. Arrange banana slices in concentric circles, starting near the crust and finishing in the center. Spread another third of dulce de leche, followed by more sliced bananas. Finish with remaining dulce de leche and sliced bananas. Refrigerate pie while you whip the cream.
                - listitem [ref=e445]:
                  - heading "Make the whipped cream:" [level=3] [ref=e446]
                  - list [ref=e447]:
                    - listitem [ref=e448]:
                      - generic [ref=e449]: Step
                      - text: 1 In a large (preferably cold) bowl, whip the remaining ¾ cup cream with the sugar until medium to stiff peaks form. Take the pie out of the fridge and apply the whipped cream on top as you desire.
                - listitem [ref=e450]:
                  - heading "Finish the pie:" [level=3] [ref=e451]
                  - list [ref=e452]:
                    - listitem [ref=e453]:
                      - generic [ref=e454]: Step
                      - text: 1 Using a microplane, grate a few pieces of dark chocolate on top. Refrigerate for about 2 hours before slicing and serving.
