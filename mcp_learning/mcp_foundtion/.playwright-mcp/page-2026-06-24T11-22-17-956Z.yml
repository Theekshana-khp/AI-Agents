          - generic [ref=e149]:
            - paragraph [ref=e150]:
              - text: If you’re unfamiliar with Banoffee pie, the concept is pretty straight-forward—
              - link "Bananas" [ref=e151] [cursor=pointer]:
                - /url: https://www.delish.com/cooking/recipe-ideas/g63871207/best-banana-recipes/
              - text: +
              - link "Toffee" [ref=e152] [cursor=pointer]:
                - /url: https://www.delish.com/cooking/recipe-ideas/recipes/a50490/chocolate-toffee-recipe/
              - text: = Banoffee. Developed in England in the 1970s to combine soft toffee (think
              - link "dulce de leche" [ref=e153] [cursor=pointer]:
                - /url: https://www.delish.com/cooking/recipe-ideas/a27244513/dulce-de-leche-recipe/
              - text: ) into a fruit pie, it traditionally consisted of a pastry crust base topped with toffee, bananas, and espresso-flavored whipped cream. It has since evolved to sit atop a graham cracker crust and to include chocolate ganache, which is the version you’ll find here. We love how impressive this
              - link "pie" [ref=e154] [cursor=pointer]:
                - /url: https://www.delish.com/cooking/recipe-ideas/g28931947/best-pie-recipes/
              - text: looks once assembled, and with minimal effort!
            - paragraph [ref=e155]:
              - strong [ref=e156]: Can I use store-bought ingredients?
            - paragraph [ref=e157]:
              - text: You
              - emphasis [ref=e158]: could
              - text: use a pre-made crust, dulce de leche, and whipped cream in a can and get this done in 15 minutes–we won’t judge. But if you’re looking for that extra special touch, we recommend going old school and making everything from scratch, from the
              - link "graham cracker crust" [ref=e159] [cursor=pointer]:
                - /url: https://www.delish.com/cooking/recipe-ideas/a36617579/graham-cracker-crust-recipe/
              - text: to the
              - link "whipped cream" [ref=e160] [cursor=pointer]:
                - /url: https://www.delish.com/cooking/recipe-ideas/a24492200/how-to-make-homemade-whipped-cream/
              - text: ". Tip: The best way to guarantee perfectly whipped cream is to keep everything as cold as possible, which means cold cream and a cold bowl. Stick your bowl in the freezer for 20 minutes beforehand, or place it over a bowl of ice while you’re whipping."
            - paragraph [ref=e161]:
              - strong [ref=e162]: What is dulce de leche?
            - paragraph [ref=e163]:
              - text: If you don’t have the mental energy (or a candy thermometer) to make
              - link "caramel" [ref=e164] [cursor=pointer]:
                - /url: https://www.delish.com/cooking/recipe-ideas/a24568214/how-to-make-caramel/
              - text: "but still want that homemade taste, dulce de leche is the way to go. Making it involves boiling a closed can of condensed milk long enough that it turns into sweet and creamy dulce de leche, also known as milk jam. It’s super simple, just be warned: You"
              - emphasis [ref=e165]: must
              - text: make sure to keep the can covered in water for the entire cooking time. We’ve never had a can explode, but it
              - emphasis [ref=e166]: is
              - text: possible. Also, although you might be tempted to skip removing the label and just boiling the can as is, take the extra step to avoid making a sticky mess of your pot.
            - paragraph [ref=e167]:
              - strong [ref=e168]: Can I make this ahead?
            - paragraph [ref=e169]:
              - text: While we suggest making this pie as close to serving time as possible, it will keep for up to 48 hours in the fridge. Any longer and the whipped cream will begin to weep, and the bananas will start oxidizing. You
              - emphasis [ref=e170]: can
              - text: make the dulce de leche ahead of time—let it cool and remove it from the can, and it will keep in the fridge for up to 1 month.
            - paragraph [ref=e171]: "Last minute tip: We do recommend using dark rather than milk or semisweet chocolate. Dark's slight bitterness helps cut the sweetness of this pie. Our go-to brands for dark chocolate are Hu and Valrhona, but you can use whatever is available."
            - paragraph [ref=e172]: Made this? Let us know how it went in the comments below!
